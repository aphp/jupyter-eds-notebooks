name: "ci-eds-notebooks"
run-name: "EDS Notebooks CI triggered by @${{ github.actor }}"

on:
  schedule:
    - cron: "0 5 * * *"

  push:
    branches-ignore:
      - "main"
    tags:
      - "v*.*.*"

jobs:
  eds-base-notebook-release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    uses: "aphp/ci-workflows/.github/workflows/container-ci.yml@main"
    with:
      dockerfile-path: "eds-base-notebook/Dockerfile"
      hadolint-ignore: "DL3008,DL3016,DL3006"
      image-name: "ghcr.io/aphp/base-eds-notebook"
      image-custom-tag: "x86_64-ubuntu-24.04"
      extra-build-args: |
        JUPYTER_NOTEBOOK_IMAGE=quay.io/jupyter/base-notebook:x86_64-ubuntu-24.04
        NOTEBOOK_IMAGE=EDS-BASE-NOTEBOOK
        NOTEBOOK_MAINTAINER=aphp
      dockle-ignore: "CIS-DI-0010,DKL-DI-0001"
      trivy-ignore-vuln-ids: |
        CVE-2024-21508
        CVE-2024-21511
        CVE-2024-45337
        CVE-2023-24538
        CVE-2023-24540
        CVE-2024-24790
        CVE-2025-68121
      trivy-ignore-license-ids: |
        WTFPL

  eds-base-notebook-dev:
    if: ${{ github.ref == 'refs/heads/dev' && github.event_name == 'push' }}
    uses: "aphp/ci-workflows/.github/workflows/container-ci.yml@main"
    with:
      dockerfile-path: "eds-base-notebook/Dockerfile"
      hadolint-ignore: "DL3008,DL3016,DL3006"
      image-name: "ghcr.io/aphp/base-eds-notebook"
      image-custom-tag: "x86_64-ubuntu-24.04-dev"
      extra-build-args: |
        JUPYTER_NOTEBOOK_IMAGE=quay.io/jupyter/base-notebook:x86_64-ubuntu-24.04
        NOTEBOOK_IMAGE=EDS-BASE-NOTEBOOK
        NOTEBOOK_MAINTAINER=aphp
      dockle-ignore: "CIS-DI-0010,DKL-DI-0001"
      trivy-ignore-vuln-ids: |
        CVE-2024-21508
        CVE-2024-21511
        CVE-2024-45337
        CVE-2023-24538
        CVE-2023-24540
        CVE-2024-24790
        CVE-2025-68121
      trivy-ignore-license-ids: |
        WTFPL

  eds-base-notebook-snapshot:
    if: ${{ github.ref != 'refs/heads/dev' && github.ref != 'refs/heads/main' && github.event_name == 'push' }}
    uses: "aphp/ci-workflows/.github/workflows/container-ci.yml@main"
    with:
      dockerfile-path: "eds-base-notebook/Dockerfile"
      hadolint-ignore: "DL3008,DL3016,DL3006"
      image-name: "ghcr.io/aphp/base-eds-notebook"
      image-custom-tag: "x86_64-ubuntu-24.04-snapshot"
      extra-build-args: |
        JUPYTER_NOTEBOOK_IMAGE=quay.io/jupyter/base-notebook:x86_64-ubuntu-24.04
        NOTEBOOK_IMAGE=EDS-BASE-NOTEBOOK
        NOTEBOOK_MAINTAINER=aphp
      dockle-ignore: "CIS-DI-0010,DKL-DI-0001"
      trivy-ignore-vuln-ids: |
        CVE-2024-21508
        CVE-2024-21511
        CVE-2024-45337
        CVE-2023-24538
        CVE-2023-24540
        CVE-2024-24790
        CVE-2025-68121
      trivy-ignore-license-ids: |
        WTFPL

  eds-base-notebook-nightly:
    if: ${{ github.event_name == 'schedule' }}
    uses: "aphp/ci-workflows/.github/workflows/container-ci.yml@main"
    with:
      dockerfile-path: "eds-base-notebook/Dockerfile"
      hadolint-ignore: "DL3008,DL3016,DL3006"
      image-name: "ghcr.io/aphp/base-eds-notebook"
      image-custom-tag: "x86_64-ubuntu-24.04"
      extra-build-args: |
        JUPYTER_NOTEBOOK_IMAGE=quay.io/jupyter/base-notebook:x86_64-ubuntu-24.04
        NOTEBOOK_IMAGE=EDS-BASE-NOTEBOOK
        NOTEBOOK_MAINTAINER=aphp
      dockle-ignore: "CIS-DI-0010,DKL-DI-0001"
      trivy-ignore-vuln-ids: |
        CVE-2024-21508
        CVE-2024-21511
        CVE-2024-45337
        CVE-2023-24538
        CVE-2023-24540
        CVE-2024-24790
        CVE-2025-68121
      trivy-ignore-license-ids: |
        WTFPL


  eds-ocaml-notebook-dev:
    uses: "aphp/ci-workflows/.github/workflows/container-ci.yml@main"
    needs: "eds-base-notebook-dev"
