        NOTEBOOK_IMAGE=EDS-R-NOTEBOOK
        NOTEBOOK_MAINTAINER=aphp
      dockle-ignore: "CIS-DI-0010,DKL-DI-0001"
      trivy-ignore-vuln-ids: |
        CVE-2024-21508
        CVE-2024-21511
        CVE-2024-45337
        CVE-2023-24538
        CVE-2023-24540
        CVE-2024-24790
        CVE-2025-68121
      trivy-ignore-license-ids: |
        WTFPL

  eds-r-notebook-nightly:
    uses: "aphp/ci-workflows/.github/workflows/container-ci.yml@main"
    needs: "eds-base-notebook-nightly"
